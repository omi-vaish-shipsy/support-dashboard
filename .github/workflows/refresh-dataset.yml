name: Refresh Friday dataset

# Pulls DevRev hourly via `npm run data`, commits the updated dataset to main,
# which triggers a Vercel redeploy so the dashboard stays near-realtime.
# Requires a repo secret named DEVREV_TOKEN (Settings → Secrets and variables → Actions).

on:
  # Hourly schedule is disabled during testing — uncomment to go live.
  # schedule:
  #   # Top of every hour (UTC). GitHub cron is best-effort and may run a few minutes late.
  #   - cron: "0 * * * *"
  workflow_dispatch: {} # manual run from the Actions tab ("Run workflow" button)

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: refresh-dataset
  cancel-in-progress: false

permissions:
  contents: write # needed to push the dataset commit to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh dataset from DevRev
        env:
          DEVREV_TOKEN: ${{ secrets.DEVREV_TOKEN }}
        run: npm run data

      - name: Commit & push if the dataset changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/friday-dataset.json
          if git diff --cached --quiet; then
            echo "No dataset changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore(data): hourly DevRev refresh"
          git push
